<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termómetro Ciudadano — Boca Chica & SDE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--red:#C0392B;--red-dim:#7a1f15;--amber:#E67E22;--green:#27AE60;--ink:#1a1a1a;--paper:#F7F4EF;--rule:#d4cfc8;--muted:#7a7570;--card:#ffffff;--neg-bg:#fdf0ee;--neu-bg:#fef9f0;--pos-bg:#eef7f1;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6}

  /* MASTHEAD */
  .masthead{border-bottom:3px solid var(--ink);padding:2rem 0 1.25rem;text-align:center;position:relative}
  .lang-toggle{position:absolute;top:1.5rem;right:1.5rem;display:flex;border:1.5px solid var(--ink);border-radius:3px;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em}
  .lang-btn{padding:.35rem .75rem;background:transparent;border:none;cursor:pointer;color:var(--muted);transition:all .15s}
  .lang-btn.active{background:var(--ink);color:#fff}
  .masthead-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
  .masthead h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.5rem);line-height:1.05;color:var(--ink)}
  .masthead-sub{margin-top:.6rem;font-size:13px;color:var(--muted)}
  .masthead-meta{display:flex;justify-content:center;gap:2rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;flex-wrap:wrap}

  /* LAYOUT */
  .container{max-width:1100px;margin:0 auto;padding:0 1.5rem}
  .section{padding:2.5rem 0;border-bottom:1px solid var(--rule)}
  .section:last-child{border-bottom:none}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem}

  /* STATS */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:4px;overflow:hidden;margin-bottom:2rem}
  .stat-card{background:var(--card);padding:1.25rem 1.5rem}
  .stat-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
  .stat-value{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1;color:var(--ink)}
  .stat-value.neg{color:var(--red)}.stat-value.pos{color:var(--green)}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:.3rem}

  /* VERDICT BAR */
  .verdict-bar-track{height:28px;display:flex;border-radius:2px;overflow:hidden;border:1px solid var(--rule);margin:1.5rem 0 .75rem}
  .verdict-seg{height:100%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;transition:width .8s ease;white-space:nowrap;overflow:hidden}
  .verdict-seg.neg{background:var(--red);color:#fff}
  .verdict-seg.neu{background:var(--amber);color:#fff}
  .verdict-seg.pos{background:var(--green);color:#fff}
  .verdict-legend{display:flex;gap:1.5rem;flex-wrap:wrap}
  .verdict-legend-item{display:flex;align-items:center;gap:.4rem;font-size:12px;color:var(--muted)}
  .verdict-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  /* CHARTS */
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;margin-top:1.5rem}
  .chart-card{background:var(--card);border:1px solid var(--rule);border-radius:4px;padding:1.25rem 1.5rem}
  .chart-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:1rem}

  /* COMMENT FEED */
  .filter-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
  .filter-btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .85rem;border:1px solid var(--rule);border-radius:2px;background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
  .filter-btn:hover{border-color:var(--ink);color:var(--ink)}
  .filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .filter-btn.active.neg{background:var(--red);border-color:var(--red)}
  .filter-btn.active.pos{background:var(--green);border-color:var(--green)}
  .filter-btn.active.neu{background:var(--amber);border-color:var(--amber)}
  .comment-list{display:flex;flex-direction:column;gap:.75rem}
  .comment-card{background:var(--card);border:1px solid var(--rule);border-left:3px solid var(--rule);border-radius:0 4px 4px 0;padding:.9rem 1.1rem}
  .comment-card.NEG{border-left-color:var(--red);background:var(--neg-bg)}
  .comment-card.NEU{border-left-color:var(--amber);background:var(--neu-bg)}
  .comment-card.POS{border-left-color:var(--green);background:var(--pos-bg)}
  .comment-meta{display:flex;gap:.75rem;align-items:center;margin-bottom:.4rem;flex-wrap:wrap}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:.15rem .5rem;border-radius:2px;font-weight:500}
  .tag.NEG{background:var(--red);color:#fff}.tag.NEU{background:var(--amber);color:#fff}.tag.POS{background:var(--green);color:#fff}
  .tag.utility{background:#eee;color:var(--ink)}.tag.platform{background:transparent;border:1px solid var(--rule);color:var(--muted)}
  .tag.boosted{background:#f0ebff;color:#5a3fa0}
  .comment-note{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:.4rem}
  .comment-text{font-size:14px;line-height:1.55;color:var(--ink)}
  .comment-scores{margin-top:.5rem;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);display:flex;gap:1rem}
  .score-neg{color:var(--red-dim)}.score-pos{color:var(--green)}
  .load-more{margin-top:1rem;width:100%;padding:.75rem;border:1px solid var(--rule);border-radius:2px;background:var(--card);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s}
  .load-more:hover{border-color:var(--ink);color:var(--ink)}

  /* METHODOLOGY BOX */
  .method-box{background:var(--card);border:1px solid var(--rule);border-radius:4px;padding:1.5rem;margin-top:1.5rem}
  .method-box h3{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:.75rem}
  .method-box p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:.5rem}
  .method-box p:last-child{margin-bottom:0}

  /* FOOTER */
  .footer{padding:2rem 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border-top:3px solid var(--ink);margin-top:1rem}

  @media(max-width:700px){.masthead-meta{flex-direction:column;gap:.5rem}.chart-grid{grid-template-columns:1fr}.lang-toggle{top:.75rem;right:.75rem}}
</style>
</head>
<body>

<div class="masthead">
  <div class="container">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <p class="masthead-eyebrow" data-i18n="eyebrow"></p>
    <h1 data-i18n="h1"></h1>
    <p class="masthead-sub" data-i18n="sub"></p>
    <div class="masthead-meta">
      <span id="meta-total">—</span>
      <span id="meta-sources">—</span>
      <span id="meta-date">—</span>
    </div>
  </div>
</div>

<div class="container">

  <section class="section">
    <p class="section-label" data-i18n="pulse-label"></p>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label" data-i18n="stat-analyzed"></div>
        <div class="stat-value" id="s-total">—</div>
        <div class="stat-sub" data-i18n="stat-analyzed-sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="stat-neg"></div>
        <div class="stat-value neg" id="s-neg">—</div>
        <div class="stat-sub" id="s-neg-pct">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="stat-neu"></div>
        <div class="stat-value" id="s-neu">—</div>
        <div class="stat-sub" id="s-neu-pct">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="stat-pos"></div>
        <div class="stat-value pos" id="s-pos">—</div>
        <div class="stat-sub" id="s-pos-pct">—</div>
      </div>
    </div>
    <div class="verdict-bar-track">
      <div class="verdict-seg neg" id="vb-neg" style="width:0%"></div>
      <div class="verdict-seg neu" id="vb-neu" style="width:0%"></div>
      <div class="verdict-seg pos" id="vb-pos" style="width:0%"></div>
    </div>
    <div class="verdict-legend">
      <div class="verdict-legend-item"><div class="verdict-legend-dot" style="background:var(--red)"></div><span data-i18n="neg-label"></span></div>
      <div class="verdict-legend-item"><div class="verdict-legend-dot" style="background:var(--amber)"></div><span data-i18n="neu-label"></span></div>
      <div class="verdict-legend-item"><div class="verdict-legend-dot" style="background:var(--green)"></div><span data-i18n="pos-label"></span></div>
    </div>
  </section>

  <section class="section">
    <p class="section-label" data-i18n="charts-label"></p>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-title" data-i18n="chart-utility"></div><canvas id="chart-utility" height="220"></canvas></div>
      <div class="chart-card"><div class="chart-title" data-i18n="chart-platform"></div><canvas id="chart-platform" height="220"></canvas></div>
      <div class="chart-card"><div class="chart-title" data-i18n="chart-source"></div><canvas id="chart-source" height="220"></canvas></div>
      <div class="chart-card"><div class="chart-title" data-i18n="chart-confidence"></div><canvas id="chart-confidence" height="220"></canvas></div>
    </div>
  </section>

  <section class="section">
    <p class="section-label" data-i18n="feed-label"></p>
    <div class="filter-row" id="filter-row"></div>
    <div class="comment-list" id="comment-list"></div>
    <button class="load-more" id="load-more" onclick="loadMore()"></button>
  </section>

  <section class="section">
    <p class="section-label" data-i18n="method-label"></p>
    <div class="method-box">
      <h3 data-i18n="method-title"></h3>
      <p data-i18n="method-p1"></p>
      <p data-i18n="method-p2"></p>
      <p data-i18n="method-p3"></p>
    </div>
  </section>

</div>

<footer class="footer">
  <div class="container">
    <span data-i18n="footer"></span>
  </div>
</footer>

<script>
// ── i18n strings ──
const I18N = {
  es: {
    eyebrow:        "Análisis de Sentimiento Ciudadano",
    h1:             "Termómetro\nCiudadano",
    sub:            "Boca Chica & Santo Domingo Este — Servicios Públicos",
    "meta-comments":"comentarios",
    "meta-sources": "fuentes",
    "meta-updated": "Actualizado",
    "pulse-label":  "Pulso general",
    "stat-analyzed":"Analizados",
    "stat-analyzed-sub":"tras filtro de idioma",
    "stat-neg":     "Negativos",
    "stat-neu":     "Neutros",
    "stat-pos":     "Positivos",
    "pct-of-total": "% del total",
    "neg-label":    "Negativo",
    "neu-label":    "Neutro",
    "pos-label":    "Positivo",
    "charts-label": "Desglose por servicio y plataforma",
    "chart-utility":"Sentimiento por servicio",
    "chart-platform":"Distribución por plataforma",
    "chart-source": "% Negativo por fuente",
    "chart-confidence":"Confianza promedio del modelo",
    "feed-label":   "Comentarios ciudadanos",
    "filter-all":   "Todos",
    "filter-neg":   "Negativos",
    "filter-neu":   "Neutros",
    "filter-pos":   "Positivos",
    "filter-media": "Medios",
    "load-more":    "Cargar más",
    "shown-of":     "de",
    "comment-note": "Comentario en español — datos reales sin traducir",
    "boosted-tag":  "lexicon",
    "method-label": "Metodología",
    "method-title": "Cómo funciona este análisis",
    "method-p1":    "Los comentarios fueron recolectados de páginas públicas de Instagram y Facebook de EDEESTE, CORAABO, la Alcaldía de Boca Chica y medios comunitarios locales usando el SDK de Apify.",
    "method-p2":    "El texto fue limpiado (eliminando URLs, menciones y emojis), detectado por idioma con langdetect, y clasificado con pysentimiento — un modelo transformer entrenado en Twitter en español. Se aplicó un léxico dominicano personalizado para mejorar la precisión en quejas de servicios públicos.",
    "method-p3":    "Los comentarios se muestran en su idioma original. Este proyecto es de uso educativo y utiliza únicamente contenido público.",
    "footer":       "Datos públicos · Instagram & Facebook · Modelo: pysentimiento (es) · Proyecto de portafolio — uso educativo",
  },
  en: {
    eyebrow:        "Citizen Sentiment Analysis",
    h1:             "Citizen\nThermometer",
    sub:            "Boca Chica & Santo Domingo Este — Public Utilities",
    "meta-comments":"comments",
    "meta-sources": "sources",
    "meta-updated": "Updated",
    "pulse-label":  "Overall pulse",
    "stat-analyzed":"Analyzed",
    "stat-analyzed-sub":"after language filter",
    "stat-neg":     "Negative",
    "stat-neu":     "Neutral",
    "stat-pos":     "Positive",
    "pct-of-total": "% of total",
    "neg-label":    "Negative",
    "neu-label":    "Neutral",
    "pos-label":    "Positive",
    "charts-label": "Breakdown by utility and platform",
    "chart-utility":"Sentiment by utility",
    "chart-platform":"Distribution by platform",
    "chart-source": "% Negative by source",
    "chart-confidence":"Average model confidence",
    "feed-label":   "Citizen comments",
    "filter-all":   "All",
    "filter-neg":   "Negative",
    "filter-neu":   "Neutral",
    "filter-pos":   "Positive",
    "filter-media": "Media",
    "load-more":    "Load more",
    "shown-of":     "of",
    "comment-note": "Comment in Spanish — real data, untranslated",
    "boosted-tag":  "lexicon",
    "method-label": "Methodology",
    "method-title": "How this analysis works",
    "method-p1":    "Comments were collected from public Instagram and Facebook pages belonging to EDEESTE, CORAABO, the Alcaldía de Boca Chica, and local community media outlets using the Apify SDK.",
    "method-p2":    "Text was cleaned (removing URLs, mentions, and emojis), language-detected with langdetect, and classified using pysentimiento — a transformer model trained on Spanish Twitter data. A custom Dominican lexicon was applied to improve accuracy for public utility complaints.",
    "method-p3":    "Comments are displayed in their original language. This is an educational portfolio project using only publicly available content.",
    "footer":       "Public data · Instagram & Facebook · Model: pysentimiento (es) · Portfolio project — educational use",
  }
};

let lang = "es";

function t(key){ return I18N[lang][key] || key; }

function setLang(l){
  lang = l;
  document.getElementById("btn-es").classList.toggle("active", l==="es");
  document.getElementById("btn-en").classList.toggle("active", l==="en");
  document.documentElement.lang = l;
  applyStrings();
  refreshFeed();
}

function applyStrings(){
  // data-i18n elements
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.dataset.i18n;
    const val = t(key);
    if(key==="h1"){
      el.innerHTML = val.replace("\n","<br>");
    } else {
      el.textContent = val;
    }
  });
  // stats pct
  updateStatSubs();
  // filter buttons
  buildFilterRow();
  // load-more button
  updateLoadMoreLabel();
}

// ── Data ──
const CSV_PATH = "scored_comments.csv";
const PAGE_SIZE = 20;
let allData=[], filteredData=[], currentPage=0, activeFilter="ALL";
let chartsBuilt = false;

Papa.parse(CSV_PATH,{
  download:true, header:true, skipEmptyLines:true,
  complete:({data})=>{
    allData = data.filter(r=>r.is_excluded==="False" && r.sentiment_label);
    init();
  },
  error:(e)=>{
    document.getElementById("comment-list").innerHTML=
      `<p style="color:var(--muted);font-size:13px;padding:1rem 0">
        Could not load scored_comments.csv.<br>
        Make sure the file is in the <code>dashboard/</code> folder.<br>
        <small>${e}</small>
      </p>`;
  }
});

function init(){
  updateMeta();
  updateStats();
  updateBar();
  buildCharts();
  applyStrings();
  setFilter("ALL");
}

function updateMeta(){
  const sources = [...new Set(allData.map(r=>r.source_handle))];
  const latest  = allData.map(r=>r.scraped_at).filter(Boolean).sort().slice(-1)[0]?.slice(0,10)||"—";
  document.getElementById("meta-total").textContent   = `${allData.length} ${t("meta-comments")}`;
  document.getElementById("meta-sources").textContent = `${sources.length} ${t("meta-sources")}`;
  document.getElementById("meta-date").textContent    = `${t("meta-updated")} ${latest}`;
}

function cnt(){
  const neg=allData.filter(r=>r.sentiment_label==="NEG").length;
  const neu=allData.filter(r=>r.sentiment_label==="NEU").length;
  const pos=allData.filter(r=>r.sentiment_label==="POS").length;
  return{neg,neu,pos,total:allData.length};
}
function pct(n,t2){return t2?Math.round(n/t2*100):0;}

function updateStats(){
  const{neg,neu,pos,total}=cnt();
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-neg").textContent   = neg;
  document.getElementById("s-neu").textContent   = neu;
  document.getElementById("s-pos").textContent   = pos;
  updateStatSubs();
}

function updateStatSubs(){
  const{neg,neu,pos,total}=cnt();
  document.getElementById("s-neg-pct").textContent = `${pct(neg,total)}% ${t("pct-of-total")}`;
  document.getElementById("s-neu-pct").textContent = `${pct(neu,total)}% ${t("pct-of-total")}`;
  document.getElementById("s-pos-pct").textContent = `${pct(pos,total)}% ${t("pct-of-total")}`;
  // also update meta spans that depend on lang
  const sources=[...new Set(allData.map(r=>r.source_handle))];
  const latest=allData.map(r=>r.scraped_at).filter(Boolean).sort().slice(-1)[0]?.slice(0,10)||"—";
  document.getElementById("meta-total").textContent   = `${allData.length} ${t("meta-comments")}`;
  document.getElementById("meta-sources").textContent = `${sources.length} ${t("meta-sources")}`;
  document.getElementById("meta-date").textContent    = `${t("meta-updated")} ${latest}`;
}

function updateBar(){
  const{neg,neu,pos,total}=cnt();
  setTimeout(()=>{
    [["neg",neg],["neu",neu],["pos",pos]].forEach(([k,v])=>{
      const el=document.getElementById(`vb-${k}`);
      const p=pct(v,total);
      el.style.width=p+"%";
      el.textContent=p>8?p+"%":"";
    });
  },150);
}

// ── Charts ──
const NEG_C="#C0392B",NEU_C="#E67E22",POS_C="#27AE60";
const TICK={font:{family:"'JetBrains Mono',monospace",size:10}};

function groupBy(arr,key){return arr.reduce((a,r)=>{(a[r[key]]=a[r[key]]||[]).push(r);return a},{});}
function avg(arr,key){return arr.length?arr.reduce((s,r)=>s+parseFloat(r[key]||0),0)/arr.length:0;}

function buildCharts(){
  if(chartsBuilt) return;
  chartsBuilt = true;

  const byUtil=groupBy(allData,"utility_type");
  const utils=Object.keys(byUtil).sort();
  new Chart(document.getElementById("chart-utility"),{
    type:"bar",
    data:{labels:utils,datasets:[
      {label:"NEG",data:utils.map(u=>byUtil[u].filter(r=>r.sentiment_label==="NEG").length),backgroundColor:NEG_C},
      {label:"NEU",data:utils.map(u=>byUtil[u].filter(r=>r.sentiment_label==="NEU").length),backgroundColor:NEU_C},
      {label:"POS",data:utils.map(u=>byUtil[u].filter(r=>r.sentiment_label==="POS").length),backgroundColor:POS_C},
    ]},
    options:{responsive:true,plugins:{legend:{display:true,labels:{font:{family:"'JetBrains Mono',monospace",size:10},boxWidth:12}}},scales:{x:{stacked:true,grid:{display:false},ticks:TICK},y:{stacked:true,grid:{color:"#ece8e1"},ticks:TICK}}}
  });

  const byPlat=groupBy(allData,"platform");
  const platK=Object.keys(byPlat);
  new Chart(document.getElementById("chart-platform"),{
    type:"doughnut",
    data:{labels:platK,datasets:[{data:platK.map(p=>byPlat[p].length),backgroundColor:["#1a1a1a","#4a90d9"],borderWidth:0}]},
    options:{responsive:true,plugins:{legend:{position:"bottom",labels:{font:{family:"'JetBrains Mono',monospace",size:10},boxWidth:12}}}}
  });

  const bySrc=groupBy(allData,"source_handle");
  const srcK=Object.keys(bySrc).sort((a,b)=>{
    return(bySrc[b].filter(r=>r.sentiment_label==="NEG").length/bySrc[b].length)
          -(bySrc[a].filter(r=>r.sentiment_label==="NEG").length/bySrc[a].length);
  });
  new Chart(document.getElementById("chart-source"),{
    type:"bar",
    data:{labels:srcK,datasets:[{
      data:srcK.map(s=>Math.round(bySrc[s].filter(r=>r.sentiment_label==="NEG").length/bySrc[s].length*100)),
      backgroundColor:srcK.map(s=>{const n=bySrc[s].filter(r=>r.sentiment_label==="NEG").length/bySrc[s].length;return n>.6?NEG_C:n>.3?NEU_C:POS_C;})
    }]},
    options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{max:100,grid:{color:"#ece8e1"},ticks:{...TICK,callback:v=>v+"%"}},y:{grid:{display:false},ticks:TICK}}}
  });

  const rows=[allData.filter(r=>r.sentiment_label==="NEG"),allData.filter(r=>r.sentiment_label==="NEU"),allData.filter(r=>r.sentiment_label==="POS")];
  const keys=["score_neg","score_neu","score_pos"];
  new Chart(document.getElementById("chart-confidence"),{
    type:"bar",
    data:{labels:["NEG","NEU","POS"],datasets:[{data:rows.map((r,i)=>Math.round(avg(r,keys[i])*100)),backgroundColor:[NEG_C,NEU_C,POS_C]}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:TICK},y:{max:100,grid:{color:"#ece8e1"},ticks:{...TICK,callback:v=>v+"%"}}}}
  });
}

// ── Filters ──
const FILTERS = [
  {key:"ALL",cls:""},
  {key:"NEG",cls:"neg"},
  {key:"NEU",cls:"neu"},
  {key:"POS",cls:"pos"},
  {key:"EDEESTE",cls:""},
  {key:"CORAABO",cls:""},
  {key:"ALCALDIA_BC",cls:""},
  {key:"MEDIA",cls:""},
];

function filterLabel(key){
  const map={ALL:"filter-all",NEG:"filter-neg",NEU:"filter-neu",POS:"filter-pos",MEDIA:"filter-media"};
  return map[key] ? t(map[key]) : key.replace("_"," ");
}

function buildFilterRow(){
  const row = document.getElementById("filter-row");
  row.innerHTML="";
  FILTERS.forEach(({key,cls})=>{
    const btn=document.createElement("button");
    btn.className=`filter-btn${cls?" "+cls:""}${activeFilter===key?" active":""}`;
    if(activeFilter===key && cls) btn.classList.add("active");
    btn.textContent=filterLabel(key);
    btn.onclick=()=>setFilter(key);
    row.appendChild(btn);
  });
}

function setFilter(f){
  activeFilter=f;
  const sent=["NEG","NEU","POS"];
  filteredData=f==="ALL"?[...allData]:sent.includes(f)?allData.filter(r=>r.sentiment_label===f):allData.filter(r=>r.utility_type===f);
  filteredData.sort((a,b)=>parseFloat(b.score_neg||0)-parseFloat(a.score_neg||0));
  currentPage=0;
  document.getElementById("comment-list").innerHTML="";
  buildFilterRow();
  loadMore();
}

function refreshFeed(){
  currentPage=0;
  document.getElementById("comment-list").innerHTML="";
  loadMore();
  buildFilterRow();
}

function loadMore(){
  const list=document.getElementById("comment-list");
  filteredData.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE).forEach(r=>{
    const neg=parseFloat(r.score_neg||0).toFixed(2);
    const neu=parseFloat(r.score_neu||0).toFixed(2);
    const pos=parseFloat(r.score_pos||0).toFixed(2);
    const d=document.createElement("div");
    d.className=`comment-card ${r.sentiment_label}`;
    d.innerHTML=`
      <div class="comment-meta">
        <span class="tag ${r.sentiment_label}">${r.sentiment_label}</span>
        <span class="tag utility">${r.utility_type}</span>
        <span class="tag platform">${r.platform}</span>
        ${r.lexicon_boosted==="True"?`<span class="tag boosted">${t("boosted-tag")}</span>`:""}
      </div>
      <div class="comment-note">${t("comment-note")}</div>
      <div class="comment-text">${esc(r.raw_text)}</div>
      <div class="comment-scores">
        <span class="score-neg">NEG ${neg}</span>
        <span>NEU ${neu}</span>
        <span class="score-pos">POS ${pos}</span>
      </div>`;
    list.appendChild(d);
  });
  currentPage++;
  updateLoadMoreLabel();
}

function updateLoadMoreLabel(){
  const shown=Math.min(currentPage*PAGE_SIZE,filteredData.length);
  const btn=document.getElementById("load-more");
  if(!filteredData.length){btn.style.display="none";return;}
  btn.textContent=`${t("load-more")} — ${shown} ${t("shown-of")} ${filteredData.length}`;
  btn.style.display=shown>=filteredData.length?"none":"block";
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
</script>
